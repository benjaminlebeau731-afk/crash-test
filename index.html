<!DOCTYPE html>
<html>
<head>
    <title>CPU Stress Test</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace;">
    <h1>Engaging CPU Lock...</h1>
    <p>The system will stop responding in 3 seconds.</p>

    <script>
        setTimeout(() => {
            console.log("Locked.");
            // This is a 'Blocking' loop. 
            // It never yields back to the OS, so the CPU stays at 100%.
            while (true) {
                // Complex math forces the CPU to stay in the "High Power" state
                Math.atan2(Math.random(), Math.random());
                Math.hypot(Math.random(), Math.random());
                
                // This prevents Chrome from showing the "Page Unresponsive" popup
                // because the UI thread is too busy to even show the warning.
            }
        }, 3000);
    </script>
</body>
</html>
