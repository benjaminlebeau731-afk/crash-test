<!DOCTYPE html>
<html>
<head>
    <title>⚡ PERSISTENT FULLSCREEN ⚡</title>
    <style>
        body { 
            background: #000; color: #0f0; font-family: monospace; 
            height: 100vh; margin: 0; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; 
        }
        h1 { text-align: center; }
    </style>
</head>
<body>
    <div id="init">
        <h1>[ SYSTEM STABLE ]</h1>
        <p>Click to enter secure mode.</p>
    </div>

    <script>
        function lock() {
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('init').innerHTML = "<h1>[ LOCK ACTIVE ]</h1><p>Attempting to exit will trigger override.</p>";
        }

        function forceBack() {
            // Check if the user is currently NOT in fullscreen
            if (!document.fullscreenElement) {
                // 1. Hammer the pop-ups
                alert("⚠ EXIT DETECTED ⚠");
                alert("⚠ RE-ESTABLISHING SECURE CONNECTION ⚠");
                alert("⚠ FULLSCREEN MANDATORY ⚠");

                // 2. Force them back in
                // The click on the "OK" button counts as the gesture needed to re-fullscreen
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }

        // Initial entry
        window.onclick = lock;

        // THE WATCHER: Triggers every time the fullscreen state changes
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                // User just tried to exit!
                forceBack();
            }
        });

        // Backup: catch keyboard escapes
        window.onkeydown = (e) => {
            if (e.key === "Escape") forceBack();
        };
    </script>
</body>
</html>
